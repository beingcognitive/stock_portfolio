<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>포트폴리오 트래커</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
<style>
  :root {
    --bg: #0f1115; --panel: #181b22; --line: #262b35;
    --txt: #e7eaf0; --muted: #8b93a3;
    --up: #2ecc71; --down: #ff5b6e; --accent: #ffa726;
    --up-dim: #6fcf97; --down-dim: #cf6f7a;  /* 당일 변량용: 누적 손익보다 채도 한 단계 낮춤 */
    --warn: #d9a441;  /* 데이터 신선도 경고(미갱신 종가) */
    --accent-bg: #20242e;                 /* 선택 알약/바 배경(악센트 틴트) */
    --accent-fill: rgba(255,167,38,.10);  /* 차트 평가금액 면 채움 */
    --accent-stroke: rgba(255,167,38,.35);/* 선택일 점선 가이드 */
    /* 현금(예비) 띠: 악센트(주식)·초록/빨강(손익)과 구분되는 차분한 블루 */
    --cash: #6f9bd8; --cash-fill: rgba(111,155,216,.22); --cash-bg: rgba(111,155,216,.12);
    --ov: #2db5a3;   /* 해외/글로벌 카테고리색(틸). 손익(초록/빨강)·하락(파랑) 시그널과 분리 */
  }
  /* 라이트 모드: 같은 변수만 갈아끼운다(구조·간격 동일). 토글은 localStorage 기억. */
  body.light {
    --bg: #f6f7f9; --panel: #ffffff; --line: #e4e7ec;
    --txt: #1c2128; --muted: #6e7681;
    --up: #1a9e54; --down: #e0394e; --accent: #ef7a10;
    --up-dim: #4caf7d; --down-dim: #d4707d;
    --warn: #b07d20;
    --accent-bg: #fdf1e3;
    --accent-fill: rgba(239,122,16,.12);
    --accent-stroke: rgba(239,122,16,.40);
    --cash: #4f7cc0; --cash-fill: rgba(79,124,192,.18); --cash-bg: rgba(79,124,192,.10);
    --ov: #0f9e8c;   /* 해외/글로벌 카테고리색(틸, 라이트테마용) */
  }
  * { box-sizing: border-box; }
  body {
    margin: 0; background: var(--bg); color: var(--txt);
    font-family: -apple-system, "Apple SD Gothic Neo", "Pretendard", sans-serif;
    padding: 24px; max-width: 1180px; margin: 0 auto;
  }
  header { display: flex; align-items: baseline; gap: 16px; flex-wrap: wrap; }
  h1 { font-size: 20px; margin: 0 0 2px; }
  .as-of { color: var(--muted); font-size: 12px; }
  .btns { margin-left: auto; display: flex; gap: 8px; }
  button {
    background: var(--panel); color: var(--txt); border: 1px solid var(--line);
    padding: 7px 14px; border-radius: 8px; cursor: pointer; font-size: 13px;
  }
  button:hover { border-color: var(--accent); }
  /* 차분 모드 토글: 평소엔 조용하게(muted), 호버 시에만 강조 */
  .calm-toggle { color: var(--muted); }
  /* 아이콘 버튼(테마 전환): 테두리·배경 없이 아이콘만. 색은 currentColor 상속. */
  .icon-btn { display: inline-flex; align-items: center; justify-content: center;
    padding: 7px 8px; background: none; border: none; }
  .icon-btn svg { display: block; }
  .icon-btn:hover { color: var(--txt); border: none; }
  /* 자산 흐름(flow): 투자원금 → 평가금액 → 총자산 으로 이어 읽는다 */
  .flow { display: flex; align-items: stretch; flex-wrap: wrap; gap: 10px; margin: 18px 0; }
  .flow-node {
    flex: 1 1 0; min-width: 150px;
    background: var(--panel); border: 1px solid var(--line); border-radius: 12px;
    padding: 16px; display: flex; flex-direction: column; justify-content: center;
  }
  .flow-node .label { color: var(--muted); font-size: 12px; }
  .flow-node .val { font-size: 20px; font-weight: 700; margin-top: 4px; }
  .flow-node.total { flex: 1.4 1 0; border-color: var(--accent); }
  .flow-node.total .val { font-size: 26px; }
  /* 차트 현금 레전드와 같은 토글(숨은 기능): 평가금액·총자산 노드 클릭 시 현금 합산 펼치고 접기 */
  .flow-node.cash-toggle { cursor: pointer; transition: border-color .12s; }
  .flow-node.cash-toggle:hover { border-color: var(--muted); }
  .flow-node.total.cash-toggle:hover { border-color: var(--accent); }
  /* 연결 연산자(+37.7% / +현금) */
  .flow-op {
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    gap: 3px; flex: 0 0 auto; padding: 0 8px; color: var(--muted);
  }
  .flow-op .oplabel { font-size: 13px; color: var(--muted); }
  .flow-op .opval { white-space: nowrap; font-weight: 700; font-size: 15px; }
  .flow-op .opval.big { font-size: 19px; }
  .flow-op .op-sub { font-size: 14px; font-weight: 600; }   /* 큰 손익 옆 수익률 (한 줄) */
  .flow-op .op-day { font-size: 12px; font-weight: 400; white-space: nowrap; }  /* 오늘자 변량 */
  /* 누적 수익 한 줄 (실현 · 총수익) */
  .flow-foot {
    flex: 1 0 100%; display: flex; flex-wrap: wrap; gap: 6px 18px; align-items: baseline;
    border-top: 1px solid var(--line); margin-top: 2px; padding-top: 12px; font-size: 13px;
  }
  .flow-foot .fk { color: var(--muted); }
  .flow-foot .ft { margin-left: auto; font-weight: 700; }
  @media (max-width: 720px) {
    .flow { flex-direction: column; }
    .flow-node, .flow-node.total { flex: 1 1 auto; }
    .flow-op { padding: 6px 0; }
    .flow-foot .ft { margin-left: 0; }
  }
  /* 계좌 필터 알약 바 */
  .acct-filter { display: flex; flex-wrap: wrap; gap: 8px; align-items: center; margin: -4px 0 18px; }
  .acct-filter .flabel { color: var(--muted); font-size: 12px; margin-right: 2px; }
  .pill {
    display: inline-flex; align-items: baseline; gap: 6px; cursor: pointer;
    background: var(--panel); border: 1px solid var(--line); border-radius: 999px;
    padding: 6px 13px; font-size: 13px; transition: border-color .12s, background .12s;
  }
  .pill:hover { border-color: var(--muted); }
  .pill.on { border-color: var(--accent); background: var(--accent-bg); }
  .pill .pv { color: var(--muted); font-size: 12px; }
  .pill.on .pv { color: var(--accent); }
  /* 거래일 이동 스테퍼: 알약 라운드를 잇는 세그먼트 컨트롤(‹ 날짜 ›).
     계좌 필터 줄 우측에 붙여 차트 클릭 없이 날짜를 한 칸씩 넘긴다. */
  .datenav {
    margin-left: auto; display: inline-flex; align-items: stretch;
    background: var(--panel); border: 1px solid var(--line); border-radius: 999px; overflow: hidden;
  }
  .datenav button {
    border: none; border-radius: 0; background: none; color: var(--txt);
    padding: 6px 12px; font-size: 13px; line-height: 1.2;
    transition: background .12s, color .12s;
  }
  .datenav button:hover:not(:disabled) { border: none; background: var(--accent-bg); color: var(--accent); }
  .datenav .arw { color: var(--muted); font-size: 15px; padding: 6px 14px; }
  /* 가운데 날짜: 탭형 숫자(tabular-nums)로 칸 이동 시 폭이 흔들리지 않게 고정 */
  .datenav .cur {
    min-width: 6.2em; text-align: center; font-variant-numeric: tabular-nums;
    color: var(--muted); cursor: default;
    border-left: 1px solid var(--line); border-right: 1px solid var(--line);
  }
  .datenav .cur.off { color: var(--accent); cursor: pointer; }   /* 과거일 선택 중 → 클릭 시 최신으로 */
  .datenav button:disabled { color: var(--line); cursor: default; }
  .up { color: var(--up); } .down { color: var(--down); }
  /* 당일 변량(전일 대비)은 누적 손익과 같은 초록/빨강을 쓰되 채도를 낮춰 시각적으로 격하한다. */
  .dir.up, .day-chg.up, .op-day.up { color: var(--up-dim); }
  .dir.down, .day-chg.down, .op-day.down { color: var(--down-dim); }
  .chart-wrap { background: var(--panel); border: 1px solid var(--line); border-radius: 12px; padding: 16px; margin-bottom: 22px; }
  /* 차트 헤더 한 줄: 좌=계좌 라벨 · 중앙=레전드 · 우=연도 필터 (Chart.js 내부 title/legend 대체) */
  .chart-top { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; flex-wrap: wrap; }
  .chart-acc { color: var(--muted); font-size: 12px; }
  .chart-legend { margin: 0 auto; display: inline-flex; gap: 18px; font-size: 12px; }
  .chart-legend .lg { display: inline-flex; align-items: center; gap: 6px; }
  .chart-legend .sw { display: inline-block; width: 18px; border-top: 2px solid; vertical-align: middle; }
  .chart-legend .sw-val { border-top-color: var(--accent); }
  .chart-legend .sw-cost { border-top-color: var(--muted); border-top-style: dashed; }
  /* 현금 띠는 면(area)이므로 선이 아닌 채워진 사각형 스와치로 표시 */
  .chart-legend .sw-cash { border-top: none; width: 14px; height: 10px; border-radius: 2px;
    background: var(--cash-fill); border: 1px solid var(--cash); }
  /* 현금 레전드 = 토글 버튼: 평소엔 흐릿(꺼짐), 켜지면 또렷+블루. 다른 레전드는 항상 표시되는 라벨. */
  .chart-legend .lg-cash { font: inherit; line-height: inherit; background: none; border: none;
    border-radius: 0; padding: 0; cursor: pointer; color: var(--muted); opacity: .5;
    transition: opacity .12s, color .12s; }
  .chart-legend .lg-cash:hover { border: none; opacity: 1; }
  .chart-legend .lg-cash.on { opacity: 1; color: var(--cash); }
  .year-sel { display: inline-flex; gap: 6px; }
  .yr { padding: 4px 12px; font-size: 12px; border-radius: 999px; }
  .yr.on { border-color: var(--accent); color: var(--accent); background: var(--accent-bg); }
  .chart-hint { color: var(--muted); font-size: 12px; margin-top: 8px; }
  .asof-bar {
    display: flex; align-items: center; gap: 12px; flex-wrap: wrap;
    background: var(--accent-bg); border: 1px solid var(--accent); border-radius: 10px;
    padding: 10px 14px; margin: 16px 0; font-size: 13px;
  }
  .asof-bar.hidden { display: none; }
  .asof-bar b { font-size: 15px; }
  /* 보유 종목 보기 토글(계좌별/종목별): 첫 계좌 헤더의 이름 바로 옆에 인라인으로 둔다. */
  .holdings-toggle { align-self: center; }
  .seg { display: inline-flex; background: var(--panel); border: 1px solid var(--line);
    border-radius: 999px; overflow: hidden; }
  .seg-btn { border: none; border-radius: 0; background: none; color: var(--muted);
    padding: 4px 12px; font-size: 12px; cursor: pointer; transition: background .12s, color .12s; }
  .seg-btn:hover:not(.on) { border: none; color: var(--txt); }
  .seg-btn.on { background: var(--accent-bg); color: var(--accent); }
  /* 종목별 보기에서 여러 계좌에 걸친 행임을 알리는 태그 */
  .tag.merged { border-color: var(--accent); color: var(--accent); }
  /* 여러 계좌 합산 행: 클릭하면 계좌별 내역 펼침(셰브론으로 상태 표시). */
  tr.merged-row { cursor: pointer; }
  tr.merged-row:hover td { background: var(--accent-bg); }
  .exp-chev { display: inline-block; font-size: 9px; margin-right: 3px; transition: transform .12s; }
  .exp-chev.open { transform: rotate(90deg); }
  /* 펼친 계좌별 하위 행: 들여쓰고 차분하게 */
  tr.sub td { color: var(--muted); font-size: 12px; background: rgba(127,127,127,.045); }
  tr.sub td.name { padding-left: 30px; }
  h2 { font-size: 15px; margin: 26px 0 10px; display: flex; align-items: center; gap: 10px; }
  h2 .acc-meta { font-size: 13px; font-weight: 400; color: var(--muted); margin-left: auto; }
  table { width: 100%; border-collapse: collapse; font-size: 13px; }
  th, td { padding: 9px 10px; text-align: right; border-bottom: 1px solid var(--line); white-space: nowrap; }
  th { color: var(--muted); font-weight: 500; font-size: 12px; }
  th.sortable { cursor: pointer; user-select: none; transition: color .12s; }
  th.sortable:hover { color: var(--txt); }
  th .sort-arrow { font-size: 10px; color: var(--muted); }
  td.name, th.name { text-align: left; white-space: normal; }
  .tag { font-size: 11px; padding: 1px 6px; border-radius: 4px; border: 1px solid var(--line); color: var(--muted); margin-left: 6px; }
  .tag.sold { border-color: var(--down); color: var(--down); }
  /* 현재가 옆 전일 대비 등락(화살표+%): 셀의 up/down 색상을 그대로 상속받아 표시 */
  .dir { font-size: 11px; margin-left: 5px; white-space: nowrap; }
  /* '전일대비' 라벨: 변량 색과 무관하게 항상 muted (누적 손익과 의미 구분) */
  .day-lbl { color: var(--muted); font-weight: 400; }
  tr.total-row td { font-weight: 700; border-top: 2px solid var(--line); border-bottom: none; }
  /* 합계 손익 아래: 그날 하루의 평가손익 변량 (전일 종가 대비) */
  .day-chg { font-size: 11px; font-weight: 400; margin-top: 3px; white-space: nowrap; }
  .loading { color: var(--muted); padding: 40px; text-align: center; }
  .section-note { color: var(--muted); font-size: 12px; margin: -4px 0 10px; }
  /* 차분 모드(기본): 전일대비/일일 등락 신호를 모두 숨긴다.
     요약 평가이익 노드(.op-day)·계좌 합계(.day-chg)·종목별 현재가 화살표(.dir).
     'python app.py --show-daily' 로 켜면 다시 보인다. */
  body.calm .dir, body.calm .day-chg, body.calm .op-day { display: none; }
  /* 데이터 신선도 경고: 해당일 실제 종가가 없어 직전 거래일 종가를 끌어다 쓰는 중.
     데이터 소스 구멍(예: yfinance .KS 당일 봉 누락)을 사용자가 모르고 지나치지 않게 한다.
     '품질 경고'라 차분 모드(전일대비 숨김)와 무관하게 항상 보인다. */
  .stale-flag { font-size: 11px; margin-left: 5px; white-space: nowrap; color: var(--warn, #d9a441); cursor: help; }
  .stale-banner { background: rgba(217,164,65,.10); border: 1px solid rgba(217,164,65,.35);
    color: var(--warn, #d9a441); font-size: 12px; line-height: 1.5; padding: 9px 12px;
    border-radius: 8px; margin: 0 0 14px; }
  /* 종목별 보기 비중 가로 막대 차트. 막대 길이 = 전체 평가금액에서 차지하는 절대 비중이라
     한 종목의 쏠림이 폭으로 바로 드러난다. 색: 주황=국내 · 파랑=해외(지역 쏠림도 같이 보임).
     레이아웃은 데이터테이블처럼 CSS grid 3컬럼(라벨 | 막대 | 값)으로 행마다 칼같이 정렬한다.
     값 컬럼은 금액(굵게)+% 2단 — 금액 가독성 최우선. 반도체 집중도 섹션과 동일한
     .wbar-row 그리드 언어를 공유해 두 영역이 픽셀 단위로 일치한다. (분할막대 .semi-split 제거) */
  :root { --wb-name: 170px; --wb-val: 124px; }
  .wbars, .semi-box { background: var(--panel); border: 1px solid var(--line); border-radius: 12px; padding: 14px 16px; margin: 12px 0 18px; }
  .semi-box { margin: 0 0 18px; }
  .wbars-head, .semi-head { display: flex; align-items: baseline; gap: 8px; flex-wrap: wrap; font-size: 13px; font-weight: 700; color: var(--txt); margin-bottom: 12px; }
  .wbars-sub, .semi-asof { color: var(--muted); font-weight: normal; font-size: 12px; }
  .wbars-legend { margin-left: auto; display: inline-flex; gap: 12px; font-size: 12px; font-weight: normal; color: var(--muted); }
  .wbars-legend i { display: inline-block; width: 10px; height: 10px; border-radius: 2px; margin-right: 4px; vertical-align: middle; }
  .wbars-legend i.kr { background: var(--accent); } .wbars-legend i.ov { background: var(--ov); }
  /* 공통 3컬럼 그리드: 라벨(고정폭) | 막대(가변) | 값(고정폭, 우측). 두 섹션이 함께 쓴다 → 칼정렬. */
  .wbar-row { display: grid; grid-template-columns: var(--wb-name) minmax(0,1fr) var(--wb-val); align-items: center; column-gap: 12px; padding: 4px 8px; margin: 2px -8px; border-radius: 8px; transition: background .15s ease; }
  .wbar-row:hover { background: var(--accent-bg); }
  .wbar-name { font-size: 12px; color: var(--txt); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .wbar-track { height: 14px; background: var(--line); border-radius: 4px; overflow: hidden; }
  .wbar-fill { height: 100%; border-radius: 4px; min-width: 2px; transition: width .25s ease; }
  .wbar-fill.kr { background: var(--accent); } .wbar-fill.ov { background: var(--ov); }
  .wbar-fill.na { background: var(--muted); opacity: .55; }
  /* 값 컬럼: 금액(굵게) 위, % 아래. 우측 정렬 + tabular-nums 로 자리수 정렬. */
  .wbar-val { text-align: right; line-height: 1.25; font-variant-numeric: tabular-nums; }
  .wbar-val .amt { display: block; font-size: 12px; font-weight: 600; color: var(--txt); white-space: nowrap; }
  .wbar-val .pct { display: block; font-size: 11px; color: var(--muted); white-space: nowrap; }
  .wbar-row.is-strong .wbar-name, .wbar-row.is-strong .wbar-val .amt { font-weight: 700; color: var(--txt); }
  /* 반도체 집중도(look-through) 섹션. 저장된 ETF 반도체 비중 × 실시간 평가금액. */
  /* 전체 반도체 노출 합계줄: 그리드 값 축과 시각적으로 맞도록 라벨/값 양끝 배치 + 위아래 구분선. */
  .semi-total { display: flex; align-items: baseline; justify-content: space-between; gap: 10px;
    font-size: 13px; color: var(--muted); margin: 2px 0 12px; padding-bottom: 11px; border-bottom: 1px solid var(--line); }
  .semi-total .lbl { color: var(--txt); }
  .semi-total .val { text-align: right; font-variant-numeric: tabular-nums; white-space: nowrap; }
  .semi-total .val b { font-size: 18px; color: var(--accent); font-weight: 700; }
  .semi-total .val .pctbig { color: var(--accent); font-weight: 700; margin-left: 6px; }
  .semi-warn { margin-top: 11px; font-size: 12px; line-height: 1.5; background: rgba(217,164,65,.10);
    border: 1px solid rgba(217,164,65,.35); color: var(--warn,#d9a441); padding: 8px 11px; border-radius: 8px; }
  .semi-note { color: var(--muted); font-size: 11px; margin-top: 12px; padding-top: 11px; border-top: 1px solid var(--line); line-height: 1.5; }
  .semi-note code { background: var(--accent-bg); padding: 1px 5px; border-radius: 4px; }
  /* 삼성+하이닉스 소계: 막대 아님. 그리드 라벨 컬럼은 비우고 값 컬럼에 정렬해 하이닉스 값 바로 아래로 떨어지게. */
  .semi-sub { display: grid; grid-template-columns: var(--wb-name) minmax(0,1fr) var(--wb-val); column-gap: 12px; align-items: baseline;
    font-size: 11px; color: var(--muted); padding: 0 8px; margin: 0 0 9px; }
  .semi-sub .cap { grid-column: 1 / 3; }
  .semi-sub .val { grid-column: 3; text-align: right; font-variant-numeric: tabular-nums; white-space: nowrap; }
  .semi-sub .val b { color: var(--txt); font-weight: 700; }
  .semi-toggle { flex: 0 0 auto; margin-left: 12px; }
  /* 반도체 집중도 토글 ON 시: 종목 비중 ↔ 반도체 집중도를 좌우 2단으로(밀도↑, ETF→투과 대비).
     좁은 화면(≤900px)에선 자동으로 위아래 1단. 카드 자체 마진은 그리드 gap 으로 대체. */
  .charts-2col { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; align-items: start; margin: 0 0 18px; }
  .charts-2col > .wbars, .charts-2col > .semi-box { margin: 0; }
  @media (max-width: 900px) { .charts-2col { grid-template-columns: 1fr; } }
  /* 분석 바: 표와 카드 사이. 토글을 카드 바로 위에 둬 컨트롤↔대상을 붙인다. */
  .analysis-bar { display: flex; align-items: center; gap: 8px; margin: 18px 0 10px; }
  .analysis-label { font-size: 13px; font-weight: 700; color: var(--txt); }
  .analysis-bar .semi-toggle { margin-left: auto; }
  .analysis-bar + .wbars { margin-top: 0; }
  @media (max-width: 560px) { :root { --wb-name: 104px; --wb-val: 100px; } .wbar-row, .semi-sub { column-gap: 9px; } .wbar-name { font-size: 11px; } }
</style>
</head>
<body class="{{ 'calm' if not show_daily else '' }}">
  <header>
    <div>
      <h1>포트폴리오 트래커</h1>
      <div class="as-of" id="asOf">불러오는 중…</div>
    </div>
    <div class="btns">
      <button id="themeToggle" class="calm-toggle icon-btn" onclick="toggleTheme()" aria-pressed="false" aria-label="테마 전환"></button>

      <button id="refreshBtn" onclick="reload(true)">새로고침</button>
    </div>
  </header>

  <div class="flow" id="summary"></div>

  <div class="acct-filter" id="acctFilter"></div>

  <div class="chart-wrap">
    <div class="chart-top">

      <span class="chart-legend">
        <span class="lg"><i class="sw sw-val"></i>평가금액</span>
        <span class="lg"><i class="sw sw-cost"></i>투자원금</span>
        <button class="lg lg-cash on" id="cashToggle" onclick="toggleCash()" aria-pressed="true" title="현금(예비)을 차트 바닥에 깔고 요약에 총자산 스텝까지 더해 보기 (클릭해 켜고 끄기)"><i class="sw sw-cash"></i>현금 (예비)</button>
      </span>
      <div class="year-sel" id="yearSel"></div>
    </div>
    <canvas id="chart" height="90"></canvas>
    <div class="chart-hint" id="chartHint"></div>
  </div>

  <div class="asof-bar hidden" id="asofBar"></div>

  <div id="staleBanner"></div>
  <div id="accounts"><div class="loading">불러오는 중…</div></div>

  <h2 id="realizedHeader" style="display:none">확정 수익 (실현)</h2>
  <div class="section-note" id="realizedNote" style="display:none"></div>
  <div id="realized"></div>

<script>
const won = n => "₩" + Math.round(Math.abs(n)).toLocaleString("ko-KR");
const signWon = n => (n < 0 ? "-" : "+") + won(n);
const pct = n => (n >= 0 ? "+" : "") + n.toFixed(1) + "%";
const cls = n => n >= 0 ? "up" : "down";
const cssVar = n => getComputedStyle(document.body).getPropertyValue(n).trim();

// ── 차분 모드(전일대비 숨김) ──────────────────────────────────────────────
// 서버 플래그(--show-daily)는 '첫 기본값'일 뿐. 사용자가 토글을 한 번 누르면
// 그 선택을 localStorage 에 기억해 새로고침/재시작 뒤에도 유지한다(서버 기본값보다 우선).
const CALM_DEFAULT = {{ 'true' if not show_daily else 'false' }};  // true = 전일대비 숨김
const SHOW_SEMI = {{ 'true' if show_semi else 'false' }};  // 반도체 집중도 섹션 표시(서버 --semi)
const CALM_KEY = "calmMode";
function readCalmPref() { try { return localStorage.getItem(CALM_KEY); } catch (e) { return null; } }
function writeCalmPref(v) { try { localStorage.setItem(CALM_KEY, v); } catch (e) {} }
function applyCalmMode(calm) {
  document.body.classList.toggle("calm", calm);
  const b = document.getElementById("calmToggle");
  if (b) {
    b.textContent = calm ? "전일대비 보기" : "전일대비 숨기기";
    b.title = calm ? "전일 대비 일일 변동을 표시한다"
                   : "전일 대비 일일 변동을 숨긴다 (차분 모드)";
    b.setAttribute("aria-pressed", String(!calm));
  }
}
function toggleCalm() {
  const calm = !document.body.classList.contains("calm");
  writeCalmPref(calm ? "1" : "0");
  applyCalmMode(calm);
}
(function initCalmMode() {
  const stored = readCalmPref();
  applyCalmMode(stored == null ? CALM_DEFAULT : stored === "1");
})();

// ── 라이트/다크 테마 ──────────────────────────────────────────────────────
// 기본은 다크. 사용자가 토글하면 localStorage 에 기억해 새로고침 뒤에도 유지한다.
// 색은 전부 CSS 변수(:root / body.light)라 클래스만 바꾸면 UI는 즉시 갈린다.
// 단, 차트(Chart.js)는 색을 JS 로 주입하므로 토글 시 renderChart() 로 다시 칠한다.
const THEME_KEY = "theme";
// 해/달 아이콘(Feather 스타일). currentColor 상속 → 버튼 색(muted/hover)·테마를 따라간다.
const SUN_ICON = '<svg viewBox="0 0 24 24" width="17" height="17" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M6.34 17.66l-1.41 1.41M19.07 4.93l-1.41 1.41"/></svg>';
const MOON_ICON = '<svg viewBox="0 0 24 24" width="17" height="17" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>';
function readThemePref() { try { return localStorage.getItem(THEME_KEY); } catch (e) { return null; } }
function writeThemePref(v) { try { localStorage.setItem(THEME_KEY, v); } catch (e) {} }
function applyTheme(light) {
  document.body.classList.toggle("light", light);
  const b = document.getElementById("themeToggle");
  if (b) {
    // 전환할 모드의 아이콘을 보여준다: 다크일 땐 해(→라이트), 라이트일 땐 달(→다크).
    b.innerHTML = light ? MOON_ICON : SUN_ICON;
    b.title = light ? "어두운 테마로 전환" : "밝은 테마로 전환";
    b.setAttribute("aria-pressed", String(light));
  }
}
function toggleTheme() {
  const light = !document.body.classList.contains("light");
  writeThemePref(light ? "light" : "dark");
  applyTheme(light);
  if (typeof chart !== "undefined" && chart) renderChart();  // 차트 색 다시 주입
}
(function initTheme() {
  applyTheme(readThemePref() === "light");
})();

let DATA, DAYS, DAYIDX, FFILL, ACC_ORDER;
let selectedAccounts = new Set();   // 비어 있으면 전체
let selectedDate = null;            // null = 마지막 거래일(현재)
let selectedYear = null;            // null = 전체 기간
let VIS = [];                       // 현재 차트에 보이는 거래일(연도 필터+트림). 스테퍼 이동 범위.
let showCash = true;                // 차트에 현금(예비) 띠 + 총자산 선 표시 여부 (기본 켜짐: 첫 로드 = 전체 포트폴리오)
let holdingsView = "account";       // 보유 종목 보기: 'account'(계좌별) | 'stock'(종목별 합산)
let holdingsSort = { key: "value", dir: "desc" };  // 보유 표 정렬: key ∈ cost|value|pl|return_pct, dir ∈ asc|desc
let expandedStocks = new Set();     // 종목별 보기에서 계좌 내역을 펼친 티커들
// 반도체 집중도 섹션 표시 여부(--semi 모드에서만 토글 노출). 선택은 localStorage 기억.
let showSemiBox = (() => { try { return localStorage.getItem("semiBox") !== "off"; } catch (e) { return true; } })();
let chart;

// ---- 데이터 적재 + 전처리 ----
// force=true → 서버 캐시를 무시하고 최신 가격(최근 구간)을 다시 받는다 (새로고침 버튼).
async function reload(force = false) {
  const btn = document.getElementById("refreshBtn");
  if (force && btn) { btn.disabled = true; btn.textContent = "갱신 중…"; }
  try {
    const url = "/api/data?t=" + Date.now() + (force ? "&force=1" : "");
    const r = await fetch(url);
    DATA = await r.json();
  } finally {
    if (force && btn) { btn.disabled = false; btn.textContent = "새로고침"; }
  }
  DAYS = DATA.trading_days;
  // 가격을 못 받아 거래일이 비면 잘못된 값(매도 종목을 보유로 집계)이 나올 수 있어 차단.
  if (!DAYS || !DAYS.length) {
    document.getElementById("asOf").textContent =
      "⚠ 가격 데이터를 불러오지 못했습니다 (일시적 조회 실패일 수 있음). 잠시 후 새로고침하세요.";
    document.getElementById("accounts").innerHTML =
      '<div class="loading">가격 데이터를 불러오지 못했습니다. 잠시 후 다시 시도하세요.</div>';
    return;
  }
  DAYIDX = {}; DAYS.forEach((d, i) => DAYIDX[d] = i);
  // 티커별 forward-fill 가격 배열 (거래일 그리드 정렬)
  FFILL = {};
  for (const tk in DATA.prices) {
    const m = DATA.prices[tk]; const arr = new Array(DAYS.length); let last = null;
    for (let i = 0; i < DAYS.length; i++) { if (m[DAYS[i]] !== undefined) last = m[DAYS[i]]; arr[i] = last; }
    FFILL[tk] = arr;
  }
  document.getElementById("asOf").textContent = "기준: " + DATA.as_of + " · 종가 기준";
  // 계좌 표시 순서: 원장의 account_order(선택)를 우선 적용하고, 목록에 없는 계좌는 원래(YAML) 순서로 뒤에 붙인다.
  //   실제 계좌명은 개인 원장(transactions.yaml)에만 두고 공개 코드에는 두지 않는다.
  const ACC_PREF = DATA.account_order || [];
  ACC_ORDER = [
    ...ACC_PREF.filter(a => DATA.accounts.includes(a)),
    ...DATA.accounts.filter(a => !ACC_PREF.includes(a)),
  ];
  renderAll();
}

const inFilter = acc => selectedAccounts.size === 0 || selectedAccounts.has(acc);
const effectiveDate = () => selectedDate || DAYS[DAYS.length - 1];
const isToday = () => !selectedDate || selectedDate === DAYS[DAYS.length - 1];

function priceOn(tk, dateStr) {
  const arr = FFILL[tk]; if (!arr) return null;
  const i = DAYIDX[dateStr]; if (i === undefined) return null;
  return arr[i];
}

// 그날 종가가 '실제 그날 봉'인지, 직전 거래일에서 끌어온(forward-fill) 값인지 판정.
//   보유 중인데 해당일 실제 봉이 없으면 미갱신으로 보고, 실제로 끌어온 출처 날짜를 돌려준다.
//   (없으면 null = 신선하거나 표시 대상 아님.) 데이터 소스가 당일 봉을 누락해도
//   사용자가 직전 값을 '오늘 값'으로 오인하지 않게 하는 안전망.
function staleAsOf(tk, dateStr) {
  const m = DATA.prices[tk];
  if (!m || m[dateStr] !== undefined) return null;   // 실제 봉 있음 → 신선
  if (priceOn(tk, dateStr) == null) return null;      // 그날 이전 데이터 자체가 없음 → 표시 대상 아님
  let last = null;                                     // 끌어온 출처 = dateStr 이하 실제 봉의 최신일
  for (const k in m) if (k <= dateStr && (last == null || k > last)) last = k;
  return last;
}
const mdLabel = iso => { const [, mo, dd] = iso.split("-"); return (+mo) + "/" + (+dd); };

// 직전 거래일(달력상). 화살표(종목)와 합계 day-change가 같은 기준을 쓰도록 단일 소스로 둔다.
function prevTradingDay(dateStr) {
  const i = DAYIDX[dateStr];
  return (i === undefined || i <= 0) ? null : DAYS[i - 1];
}

// 종목 종가가 '직전 거래일 종가' 대비 등락 → {cls, arrow:'▲'/'▼'/'', pct}.
//   heldPrev === false (직전 거래일 미보유 = 당일 신규매수)면 화살표 숨김 → 합계 교집합과 일관.
function priceDayMove(tk, dateStr, heldPrev) {
  if (heldPrev === false) return { cls: "", arrow: "", pct: null };
  const prevDay = prevTradingDay(dateStr);
  if (!prevDay) return { cls: "", arrow: "", pct: null };
  const cur = priceOn(tk, dateStr), prev = priceOn(tk, prevDay);
  if (cur == null || prev == null || prev <= 0) return { cls: "", arrow: "", pct: null };
  const chg = (cur - prev) / prev * 100;
  if (cur > prev) return { cls: "up", arrow: "▲", pct: chg };
  if (cur < prev) return { cls: "down", arrow: "▼", pct: chg };
  return { cls: "", arrow: "", pct: null };
}

// 그날 하루의 평가손익 변량: 직전 거래일에도·당일에도 보유한 종목(account|ticker 교집합)만,
//   '연속 보유 수량 min(전일, 당일)'으로 직전→당일 종가 재평가한다. 당일 매수분(전일 미보유)과
//   매도분(당일 미보유)을 대칭으로 제외해, 현금흐름이 아닌 순수 가격 변동만 잡는다.
//   prevRows = 직전 거래일 보유, todayRows = 당일 보유 (둘 다 positionsOnDate 산출, 필터 적용됨).
function dayChange(prevRows, todayRows, dateStr) {
  const prevDay = prevTradingDay(dateStr);
  if (!prevDay) return null;
  const todayShares = {};
  for (const r of todayRows) todayShares[r.account + "|" + r.ticker] = r.shares;
  let chg = 0, prevVal = 0, any = false;
  for (const r of prevRows) {
    const ts = todayShares[r.account + "|" + r.ticker];
    if (ts == null) continue;                  // 당일 미보유(전량/부분 매도된 키) → 제외
    const shares = Math.min(r.shares, ts);      // 연속 보유 수량
    if (shares <= 0) continue;
    const cur = priceOn(r.ticker, dateStr), prev = priceOn(r.ticker, prevDay);
    if (cur == null || prev == null || prev <= 0) continue;
    chg += shares * (cur - prev);
    prevVal += shares * prev;
    any = true;
  }
  if (!any || prevVal <= 0) return null;
  return { chg, pct: chg / prevVal * 100 };
}

// 그날 하루 변량 표시 (계좌 합계·상단 요약 공용). 손익 칸엔 ₩, 수익률 칸엔 %를 따로 붙여
//   각 컬럼의 단위와 일변량을 정렬한다. 상단 요약은 한 노드라 둘을 합친 dayChangeText 사용.
const dayArrow = dc => !dc ? "" : dc.chg > 0 ? "▲ " : dc.chg < 0 ? "▼ " : "";
const dayChangeText = dc => !dc ? "" : `(${signWon(dc.chg)}, ${dayArrow(dc)}${pct(dc.pct)})`;
const dayChangeWon = dc => !dc ? "" : `(${signWon(dc.chg)})`;  // 화살표는 % 쪽에만 ('전일대비'+부호+색으로 방향 충분)
const dayChangePct = dc => !dc ? "" : `(${dayArrow(dc)}${pct(dc.pct)})`;
const dayChangeCls = dc => !dc ? "" : dc.chg > 0 ? "up" : dc.chg < 0 ? "down" : "";

// 특정일에 보유 중이던 포지션 목록 (계좌 필터 적용)
function positionsOnDate(dateStr) {
  const agg = {};
  const add = (acc, name, ticker, region, shares, cost, value) => {
    const k = acc + "|" + ticker;
    if (!agg[k]) agg[k] = { account: acc, name, ticker, region, shares: 0, cost: 0, value: 0 };
    agg[k].shares += shares; agg[k].cost += cost; agg[k].value += value;
  };
  for (const l of DATA.lots) {
    if (!inFilter(l.account) || l.date > dateStr) continue;
    const p = priceOn(l.ticker, dateStr);
    add(l.account, l.name, l.ticker, l.region, l.shares, l.shares * l.price,
        l.shares * (p != null ? p : l.price));
  }
  for (const c of DATA.closed) {
    if (!inFilter(c.account) || dateStr >= c.sell_date) continue;
    const p = priceOn(c.ticker, dateStr);
    for (const tr of c.tranches) {
      if (tr.date > dateStr) continue;
      const fb = tr.shares ? tr.cost / tr.shares : 0;
      add(c.account, c.name, c.ticker, c.region, tr.shares, tr.cost,
          tr.shares * (p != null ? p : fb));
    }
  }
  const rows = Object.values(agg).map(r => ({
    ...r, avg_price: r.shares ? r.cost / r.shares : 0,
    price: r.shares ? r.value / r.shares : 0,
    pl: r.value - r.cost, return_pct: r.cost ? (r.value - r.cost) / r.cost * 100 : 0,
    sold: false,
  }));
  return rows;
}

function accountValueOnDate(acc, dateStr) {
  let v = 0;
  for (const l of DATA.lots) if (l.account === acc && l.date <= dateStr) {
    const p = priceOn(l.ticker, dateStr); v += l.shares * (p != null ? p : l.price);
  }
  for (const c of DATA.closed) if (c.account === acc && dateStr < c.sell_date) {
    const p = priceOn(c.ticker, dateStr);
    for (const tr of c.tranches) if (tr.date <= dateStr) {
      const fb = tr.shares ? tr.cost / tr.shares : 0;
      v += tr.shares * (p != null ? p : fb);
    }
  }
  for (const c of (DATA.cash || [])) if (c.account === acc && c.date <= dateStr) v += c.amount;
  return v;
}

// 기준일까지 누적된 현금(예비). 예비현금은 별도 현금 전용 계좌(케이뱅크 등)에 있어
// 종목 계좌 필터로는 고를 수 없으므로, 계좌 필터와 무관한 '보편 잔액'으로 항상 전액을 더한다.
function cashOnDate(dateStr) {
  let v = 0;
  for (const c of (DATA.cash || [])) {
    if (c.date > dateStr) continue;
    v += c.amount;
  }
  return v;
}

// 기준일까지의 확정수익 (계좌 필터 적용)
function realizedAsOf(dateStr) {
  const trades = []; const accounts = {}; let total = 0;
  for (const c of DATA.closed) {
    if (!inFilter(c.account) || c.sell_date > dateStr) continue;
    const cost = c.tranches.reduce((s, t) => s + t.cost, 0);
    const buy_date = c.tranches.reduce((m, t) => t.date < m ? t.date : m, c.tranches[0].date);
    const pl = c.proceeds - cost; total += pl;
    accounts[c.account] = (accounts[c.account] || 0) + pl;
    trades.push({ account: c.account, name: c.name, buy_date, sell_date: c.sell_date,
      cost, proceeds: c.proceeds, pl, return_pct: cost ? pl / cost * 100 : 0 });
  }
  trades.sort((a, b) => b.sell_date.localeCompare(a.sell_date));
  return { total, accounts, trades };
}

// ---- 렌더 ----
// renderChart 가 VIS(보이는 거래일)를 갱신하므로, 스테퍼를 그리는 renderAccountFilter 보다 먼저 돌린다.
function renderAll() { renderSummary(); renderYearSel(); renderChart(); renderAccountFilter(); renderAsofBar(); renderHoldings(); renderRealized(); }

// 선택된 계좌가 실제로 무언가 보유한 거래일이 있는 연도만 추린다.
//   (필터 해제 시엔 전체 계좌 기준 → DAYS의 모든 연도.) 2026에만 거래가 있는 계좌를
//   골랐을 때 2025 버튼이 뜨던 문제를 막는다. held = 그날 보유 포지션이 하나라도 있는지.
function availableYears() {
  const held = d => {
    for (const l of DATA.lots)
      if (inFilter(l.account) && l.date <= d) return true;
    for (const c of DATA.closed)
      if (inFilter(c.account) && d < c.sell_date)
        for (const tr of c.tranches) if (tr.date <= d) return true;
    return false;
  };
  const years = new Set();
  for (const d of DAYS) if (held(d)) years.add(d.slice(0, 4));
  return [...years].sort();
}

function renderYearSel() {
  const years = availableYears();
  // 계좌를 좁혀 현재 선택 연도가 사라졌다면 '전체'로 되돌린다 (빈 차트 방지).
  if (selectedYear && !years.includes(selectedYear)) selectedYear = null;
  const opts = [["전체", null], ...years.map(y => [y, y])];
  document.getElementById("yearSel").innerHTML = opts.map(([label, val]) =>
    `<button class="yr${selectedYear === val ? " on" : ""}" onclick="setYear(${val ? `'${val}'` : "null"})">${label}</button>`
  ).join("");
}
// 연도 필터 변경 → renderAll 로 VIS·스테퍼 경계까지 함께 갱신(필터 밖 화살표 비활성화 반영).
function setYear(y) { selectedYear = y; renderAll(); }

// 현금(예비) 토글. 차트의 현금 띠와 요약의 '총자산' 스텝을 함께 켜고 끈다
// (끄면 흐름이 강조 노드 '평가금액'에서 끝난다). 표는 영향 없음.
function toggleCash() { showCash = !showCash; renderChart(); renderSummary(); }

function renderSummary() {
  const d = effectiveDate();
  const pos = positionsOnDate(d);
  const value = pos.reduce((s, p) => s + p.value, 0);
  const cost = pos.reduce((s, p) => s + p.cost, 0);
  const pl = value - cost, ret = cost ? pl / cost * 100 : 0;
  const prevDay = prevTradingDay(d);
  const prevPos = prevDay ? positionsOnDate(prevDay) : [];
  const dc = dayChange(prevPos, pos, d);   // 전체 보유의 '전일대비' 평가손익 변량(연속보유 교집합)
  const realized = realizedAsOf(d).total;
  const cash = cashOnDate(d);
  const net = value + cash;
  const totalGain = pl + realized;

  // toggle=true 인 노드는 차트 현금 레전드와 동일하게 클릭 시 현금(예비)을 켜고 끈다(숨은 기능).
  const node = (label, valHtml, total, toggle) =>
    `<div class="flow-node${total ? " total" : ""}${toggle ? " cash-toggle" : ""}"${
       toggle ? ` onclick="toggleCash()" title="${showCash ? "현금(예비) 합산을 접어 평가금액까지만 보기" : "현금(예비)을 더해 총자산까지 보기"}"` : ""}><div class="label">${label}</div>
       <div class="val">${valHtml}</div></div>`;
  const op = (label, cls_, ...vals) =>
    `<div class="flow-op"><span class="oplabel">${label}</span>
       ${vals.map(v => {
         const txt = typeof v === "string" ? v : v.text;
         const big = (typeof v === "object" && v.big) ? " big" : "";
         return `<span class="opval ${cls_}${big}">${txt}</span>`;
       }).join("")}</div>`;

  // 흐름의 척추 = 잔액(balance): 투자원금 → (평가손익) → 평가금액 → (+현금) → 총자산.
  // 핵심 강조는 '평가금액'(주식). 현금은 부가 정보로 총자산에 합산만 한다.
  const valLabel = isToday() ? "평가금액" : "평가금액 (" + d + ")";
  // 평가이익 노드: 1줄 = 금액 · 수익률, 2줄 = 오늘자 변량(아래 합계 라인과 동일 포맷).
  const plLabel = pl >= 0 ? "평가이익 (미실현)" : "평가손실 (미실현)";
  const plOp = `<div class="flow-op"><span class="oplabel">${plLabel}</span>`
    + `<span class="opval ${cls(pl)} big">${signWon(pl)} <span class="op-sub">· ${pct(ret)}</span></span>`
    + (dc ? `<span class="op-day ${dayChangeCls(dc)}"><span class="day-lbl">전일대비</span> ${dayChangeText(dc)}</span>` : "")
    + `</div>`;
  const parts = [
    node("투자원금", won(cost)),
    plOp,
    node(valLabel, won(value), true, cash > 0),   // 현금 있으면 클릭으로 총자산 펼치기
  ];
  // 현금(예비) 합산 + 총자산 = '세 번째 스텝'. 차트 현금 토글이 켜졌을 때만 노출.
  if (cash > 0 && showCash) {
    parts.push(
      op("현금 (예비) 합산", "muted", signWon(cash)),
      node("총자산 (평가 + 현금)", won(net), false, true));   // 클릭으로 다시 접기
  }
  // 누적 수익(profit) 한 줄: 미실현은 위 연산자에 있으므로 여기선 실현 + 총수익만.
  parts.push(
    `<div class="flow-foot">
       <span class="fk">확정수익 (실현)</span> <span class="${cls(realized)}">${signWon(realized)}</span>
       <span class="ft">총수익 <span class="${cls(totalGain)}">${signWon(totalGain)}</span></span>
     </div>`);
  document.getElementById("summary").innerHTML = parts.join("");
}

// 계좌 필터 알약 바. '전체' = 필터 해제, 나머지는 토글.
// 보유 종목이 있는 계좌만 노출한다. 현금 전용 계좌(예: 케이뱅크)는 필터해도
// 보여줄 내역이 없으므로 제외하되, 현금 자체는 '전체' 합계에는 그대로 포함된다.
function renderAccountFilter() {
  const d = effectiveDate();
  const hasPos = new Set();
  for (const l of DATA.lots) hasPos.add(l.account);
  for (const c of DATA.closed) hasPos.add(c.account);
  const pills = [
    `<span class="flabel">계좌</span>`,
    `<span class="pill${selectedAccounts.size === 0 ? " on" : ""}" onclick="clearAccounts()">전체</span>`,
  ];
  for (const acc of ACC_ORDER) {
    if (!hasPos.has(acc)) continue;
    const av = accountValueOnDate(acc, d);
    const on = selectedAccounts.has(acc) ? " on" : "";
    pills.push(`<span class="pill${on}" onclick="toggleAccount('${acc}', event)">${acc}<span class="pv">${Math.round(av / 1e6).toLocaleString()}M</span></span>`);
  }
  pills.push(dateNavHTML());
  document.getElementById("acctFilter").innerHTML = pills.join("");
}

// 스테퍼는 차트에 보이는 거래일(VIS) 안에서만 이동한다 → 연도 필터를 켜면 그 구간의
// 양끝에서 화살표가 비활성화되어 필터를 넘지 않는다('필터 유지, 끝에서 멈춤').
// 선택일이 VIS 밖이면(예: 필터 2025 + 최신=2026) 구간 바로 바깥으로 간주해
// 첫 화살표 입력에 구간 끝으로 진입하게 한다.
function navIndex() {
  const cur = effectiveDate();
  const i = VIS.indexOf(cur);
  if (i >= 0) return i;
  return cur > VIS[VIS.length - 1] ? VIS.length : -1;
}

// 거래일 이동 스테퍼(‹ 날짜 ›). VIS 양끝에서 해당 화살표를 비활성화한다.
function dateNavHTML() {
  if (!VIS.length) return "";
  const i = navIndex();
  const atFirst = i <= 0, atLast = i >= VIS.length - 1, off = !isToday();
  return `<div class="datenav" role="group" aria-label="거래일 이동">
    <button class="arw" onclick="stepDate(-1)" aria-label="이전 거래일"${atFirst ? " disabled" : ""}>‹</button>
    <button class="cur${off ? " off" : ""}" onclick="gotoLatest()" title="${off ? "최신 거래일로" : "최신 거래일"}">${effectiveDate()}</button>
    <button class="arw" onclick="stepDate(1)" aria-label="다음 거래일"${atLast ? " disabled" : ""}>›</button>
  </div>`;
}

// 거래일 한 칸 이동(delta: -1 과거 / +1 미래). 마지막 칸은 '현재'(selectedDate=null)로 정규화.
function stepDate(delta) {
  if (!VIS.length) return;
  const j = navIndex() + delta;
  if (j < 0 || j >= VIS.length) return;                // 가시 구간 경계 밖 → 무시
  selectedDate = VIS[j] === DAYS[DAYS.length - 1] ? null : VIS[j];
  renderAll();
}
// '현재로' 복귀: 최신 거래일이 현재 연도 필터 밖이면(예: 필터 2025, 최신=2026) 필터를
// 풀어 차트가 현재까지 보이게 한다. 필터가 이미 최신 연도면 그대로 둔다.
function gotoLatest() {
  const latestYear = DAYS[DAYS.length - 1].slice(0, 4);
  if (selectedYear && selectedYear !== latestYear) selectedYear = null;
  selectedDate = null;
  renderAll();
}

// ←/→ 로도 거래일 이동(입력 요소 포커스 중엔 무시).
document.addEventListener("keydown", e => {
  if (e.metaKey || e.ctrlKey || e.altKey) return;
  if (e.target && e.target.closest && e.target.closest("input,textarea,select")) return;
  if (e.key === "ArrowLeft") { stepDate(-1); e.preventDefault(); }
  else if (e.key === "ArrowRight") { stepDate(1); e.preventDefault(); }
});

function toggleAccount(acc, ev) {
  // '전체 → 개별 계좌'로 처음 들어설 때만 현금(예비)을 끈다 → 필터의 의미(주식 구성)에 집중.
  // 이미 필터 중일 땐 사용자가 켠 현금 상태를 건드리지 않는다(자유롭게 조정 유지).
  if (selectedAccounts.size === 0) showCash = false;
  // Cmd/Ctrl+클릭 = 토글: 이 계좌를 선택에 더하거나 뺀다(여러 계좌 조합).
  if (ev && (ev.metaKey || ev.ctrlKey)) {
    if (selectedAccounts.has(acc)) selectedAccounts.delete(acc); else selectedAccounts.add(acc);
    renderAll();
    return;
  }
  // Shift+클릭 = "이 계좌만 제외": 보유 종목이 있는 나머지 계좌를 모두 선택한다.
  if (ev && ev.shiftKey) {
    const hasPos = new Set();
    for (const l of DATA.lots) hasPos.add(l.account);
    for (const c of DATA.closed) hasPos.add(c.account);
    selectedAccounts = new Set(ACC_ORDER.filter(a => a !== acc && hasPos.has(a)));
    renderAll();
    return;
  }
  // 그냥 클릭 = "이 계좌만 선택": 나머지는 모두 해제한다.
  selectedAccounts = new Set([acc]);
  renderAll();
}
// 전체 = 필터 해제 → 포트폴리오 전체. 이땐 현금 합산(총자산)이 의미 있으므로 현금을 켠다
// (개별 계좌 필터는 반대로 끈다 — toggleAccount 참고). 둘 다 이후 자유롭게 조정 가능.
function clearAccounts() { showCash = true; selectedAccounts.clear(); renderAll(); }

// 선택일에 옅은 점선 수직 가이드선을 그린다 (흰 테두리 점과 함께 선택일을 부각).
const selDatePlugin = {
  id: "selDate",
  afterDatasetsDraw(chart) {
    if (!selectedDate) return;
    const i = chart.data.labels.indexOf(selectedDate);
    if (i < 0) return;
    const x = chart.scales.x.getPixelForValue(i);
    const { top, bottom } = chart.chartArea;
    const ctx = chart.ctx;
    ctx.save();
    ctx.setLineDash([4, 4]);
    ctx.lineWidth = 1;
    ctx.strokeStyle = cssVar("--accent-stroke");
    ctx.beginPath(); ctx.moveTo(x, top); ctx.lineTo(x, bottom); ctx.stroke();
    ctx.restore();
  },
};

function renderChart() {
  // 전 구간을 계산한 뒤, 앞뒤의 빈(0) 구간만 잘라낸다.
  // 중간의 0 일(전량 매도해 현금화한 날)은 그대로 둬서 딥이 보이게 한다.
  const rawD = [], rawV = [], rawC = [], rawCash = [];
  for (const d of DAYS) {
    if (selectedYear && d.slice(0, 4) !== selectedYear) continue;
    const pos = positionsOnDate(d);
    rawD.push(d);
    rawV.push(pos.reduce((s, p) => s + p.value, 0));
    rawC.push(pos.reduce((s, p) => s + p.cost, 0));
    rawCash.push(cashOnDate(d));
  }
  let lo = 0, hi = rawV.length - 1;
  while (lo <= hi && rawV[lo] <= 0) lo++;
  while (hi >= lo && rawV[hi] <= 0) hi--;
  const labels = rawD.slice(lo, hi + 1);
  const value = rawV.slice(lo, hi + 1);
  const cost = rawC.slice(lo, hi + 1);
  VIS = labels;                          // 스테퍼 이동 범위 = 차트에 실제로 보이는 거래일
  const selIdx = selectedDate ? labels.indexOf(selectedDate) : -1;
  // 차트 색은 CSS 변수에서 읽어 테마(다크/라이트)에 따라간다.
  const accent = cssVar("--accent"), muted = cssVar("--muted"),
        line = cssVar("--line"), fill = cssVar("--accent-fill"), bg = cssVar("--bg");
  const valDs = { label: "평가금액", borderColor: accent, backgroundColor: fill,
      tension: .2, pointRadius: labels.map((_, i) => i === selIdx ? 7 : 0),
      pointBackgroundColor: accent,
      pointHoverRadius: 5, pointHoverBackgroundColor: accent, pointHoverBorderColor: bg, pointHoverBorderWidth: 2,
      pointBorderColor: labels.map((_, i) => i === selIdx ? bg : "transparent"),
      pointBorderWidth: labels.map((_, i) => i === selIdx ? 2.5 : 0), borderWidth: 2 };
  const costDs = { label: "투자원금", data: cost, borderColor: muted, borderDash: [5, 5],
      fill: false, tension: .2, pointRadius: 0, borderWidth: 1.5 };
  valDs.data = value;        // 평가금액 선은 항상 실제 평가금액
  valDs.fill = true;         // 0→평가금액 (오렌지 면)
  let datasets, cashArr = null;
  // 현금 토글: 평가금액 위에 현금(예비)을 얹는다. 현금선(=총자산)을 평가금액선(0번)까지
  //   채워 '현금 띠'를 위쪽에 그린다(윗변 = 총자산). data엔 총자산을 담아 선을 윗변에 둔다.
  if (showCash) {
    cashArr = rawCash.slice(lo, hi + 1);
    const cashDs = { label: "현금 (예비)", data: value.map((v, i) => v + cashArr[i]),
      borderColor: cssVar("--cash"), backgroundColor: cssVar("--cash-fill"), fill: { target: 0 },
      tension: .2, pointRadius: 0, borderWidth: 1.5 };
    datasets = [valDs, cashDs, costDs];
  } else {
    datasets = [valDs, costDs];
  }
  const data = { labels, datasets };
  const filterLabel = selectedAccounts.size ? [...selectedAccounts].join(" + ") : "전체 계좌";
  document.getElementById("chartAcc").textContent = filterLabel;
  // 현금 레전드 칩의 켜짐 상태를 동기화(항상 보이며, 켜지면 블루로 또렷).
  const ct = document.getElementById("cashToggle");
  ct.classList.toggle("on", showCash); ct.setAttribute("aria-pressed", showCash);
  const opts = {
    responsive: true, interaction: { mode: "index", intersect: false },
    onClick: (e, els, ch) => {
      const pts = ch.getElementsAtEventForMode(e, "index", { intersect: false }, true);
      if (pts.length) { selectedDate = ch.data.labels[pts[0].index]; renderAll(); }
    },
    plugins: {
      legend: { display: false },
      title: { display: false },
      tooltip: { callbacks: {
        // 켜짐 상태에선 현금(예비) 데이터가 '총자산'(윗변)이므로, 표시 땐 현금만 환원.
        label: c => (showCash && c.dataset.label === "현금 (예비)")
          ? "현금 (예비): " + won(cashArr[c.dataIndex])
          : c.dataset.label + ": " + won(c.parsed.y),
        afterBody: items => {
          const vi = items.find(i => i.dataset.label === "평가금액");  // 항상 실제 평가금액
          const co = items.find(i => i.dataset.label === "투자원금")?.parsed.y;
          const lines = [];
          if (vi && co != null) {
            const diff = vi.parsed.y - co;
            lines.push("평가이익: " + signWon(diff) + " (" + pct(co ? diff / co * 100 : 0) + ")");
          }
          if (showCash && vi) lines.push("총자산: " + won(vi.parsed.y + cashArr[vi.dataIndex]));  // 평가 + 현금
          return lines;
        },
      } },
    },
    scales: {
      x: { ticks: { color: muted, maxTicksLimit: 10 }, grid: { color: line } },
      y: { beginAtZero: true, ticks: { color: muted, callback: v => "₩" + (v / 1e6).toFixed(0) + "M" }, grid: { color: line } },
    },
  };
  if (chart) { chart.data = data; chart.options = opts; chart.update(); }
  else chart = new Chart(document.getElementById("chart"), { type: "line", data, options: opts, plugins: [selDatePlugin] });
  document.getElementById("chartHint").textContent =
    `${labels[0]} ~ ${labels[labels.length - 1]} · ${labels.length} 거래일 · 그래프의 점을 클릭하면 그날 보유 내역을 봅니다 (매도 종목은 보유 기간만 반영)`;
}

function renderAsofBar() {
  const bar = document.getElementById("asofBar");
  if (isToday()) { bar.classList.add("hidden"); return; }
  bar.classList.remove("hidden");
  const d = effectiveDate();
  const pos = positionsOnDate(d);
  const value = pos.reduce((s, p) => s + p.value, 0);
  bar.innerHTML = `📅 <b>${d}</b> 기준 보유 내역 · 평가 ${won(value)}
    <button onclick="gotoLatest()" style="margin-left:auto">현재로 돌아가기</button>`;
}

function setHoldingsView(v) { holdingsView = v; renderHoldings(); }

// 정렬 가능한 숫자 열 헤더 클릭: 같은 열이면 방향 토글, 다른 열이면 그 열로 내림차순부터.
function setHoldingsSort(key) {
  if (holdingsSort.key === key) holdingsSort.dir = holdingsSort.dir === "desc" ? "asc" : "desc";
  else holdingsSort = { key, dir: "desc" };
  renderHoldings();
}
// 현재 정렬 기준으로 보유 행 정렬(원본 보존). 동률이면 평가금액 내림차순으로 안정화.
function sortHoldings(rows) {
  const { key, dir } = holdingsSort, s = dir === "asc" ? 1 : -1;
  return rows.slice().sort((a, b) => (a[key] - b[key]) * s || b.value - a.value);
}

// 보기 토글(계좌별/종목별) 마크업. 첫 헤더 이름 옆에 인라인으로 넣는다(현재 보기에 on 표시).
const holdingsToggleHTML = () => `<span class="seg holdings-toggle" role="group" aria-label="보유 종목 보기">
  <button class="seg-btn${holdingsView === "account" ? " on" : ""}" onclick="setHoldingsView('account')">계좌별</button>
  <button class="seg-btn${holdingsView === "stock" ? " on" : ""}" onclick="setHoldingsView('stock')">종목별</button>
</span>`;

// 반도체 집중도 섹션 표시 토글(우측). --semi 모드 + 종목별 보기에서만 노출.
const semiToggleHTML = () => SHOW_SEMI
  ? `<span class="seg semi-toggle"><button class="seg-btn${showSemiBox ? " on" : ""}"
       onclick="toggleSemiBox()" title="반도체 집중도 섹션 표시/숨김">🔬 반도체 집중도</button></span>`
  : "";
function toggleSemiBox() {
  showSemiBox = !showSemiBox;
  try { localStorage.setItem("semiBox", showSemiBox ? "on" : "off"); } catch (e) {}
  renderHoldings();
}

// 종목별 보기에서 '계좌 합산' 행을 펼치거나 접는다(계좌별 내역 하위 행).
function toggleStock(tk) {
  if (expandedStocks.has(tk)) expandedStocks.delete(tk); else expandedStocks.add(tk);
  renderHoldings();
}

// 보유 종목 표 공용 헤더(선택일에 따라 '현재가'/'그날 종가').
// 정렬 가능한 숫자 열 헤더. 활성 열엔 방향 화살표(▼ 내림 / ▲ 오름)를 붙인다.
function sortTh(key, label) {
  const active = holdingsSort.key === key;
  const arrow = active ? (holdingsSort.dir === "asc" ? " ↑" : " ↓") : "";
  return `<th class="sortable" onclick="setHoldingsSort('${key}')" title="${label} 기준 정렬">${label}<span class="sort-arrow">${arrow}</span></th>`;
}
const holdingsThead = () => `<thead><tr>
  <th class="name">종목</th><th>수량</th><th>평균단가</th><th>${isToday() ? "현재가" : effectiveDate() + " 종가"}</th>
  ${sortTh("cost", "매입금액")}${sortTh("value", "평가금액")}${sortTh("pl", "손익")}${sortTh("return_pct", "수익률")}
</tr></thead>`;

// 한 종목 행. nameExtra: 이름 옆 추가 태그(종목별 보기의 '계좌 합산' 등). trAttrs: <tr> 추가 속성.
function holdingRow(r, d, prevHeld, staleTickers, nameExtra = "", trAttrs = "") {
  const mv = priceDayMove(r.ticker, d, prevHeld.has(r.ticker));
  const stale = staleAsOf(r.ticker, d);
  if (stale) staleTickers.add(r.ticker);
  const staleTag = stale
    ? `<span class="stale-flag" title="${d} 종가가 아직 데이터 소스에 없어 ${stale} 종가를 표시 중입니다. 새로고침해도 소스에 해당일 봉이 없으면 그대로일 수 있습니다.">⚠ ${mdLabel(stale)} 종가</span>`
    : "";
  return `<tr ${trAttrs}>
    <td class="name">${r.name}<span class="tag">${r.region}</span>${nameExtra}</td>
    <td>${Math.round(r.shares).toLocaleString()}</td>
    <td>${won(r.avg_price)}</td>
    <td>${won(r.price)}${staleTag}<span class="dir ${mv.cls}">${mv.arrow}${mv.pct != null ? " " + pct(mv.pct) : ""}</span></td>
    <td>${won(r.cost)}</td>
    <td>${won(r.value)}</td>
    <td class="${cls(r.pl)}">${signWon(r.pl)}</td>
    <td class="${cls(r.pl)}">${pct(r.return_pct)}</td>
  </tr>`;
}

// 펼친 계좌별 하위 행(종목별 보기). 종목 칸엔 계좌명, 나머지는 그 계좌 보유분.
function holdingSubRow(p) {
  return `<tr class="sub">
    <td class="name">${p.account}</td>
    <td>${Math.round(p.shares).toLocaleString()}</td>
    <td>${won(p.avg_price)}</td>
    <td>${won(p.price)}</td>
    <td>${won(p.cost)}</td>
    <td>${won(p.value)}</td>
    <td class="${cls(p.pl)}">${signWon(p.pl)}</td>
    <td class="${cls(p.pl)}">${pct(p.return_pct)}</td>
  </tr>`;
}

// 합계 행(매입·평가·손익·수익률 + 선택 시 전일대비).
function holdingsTotalRow(cost, val, dc) {
  const pl = val - cost, ret = cost ? pl / cost * 100 : 0;
  return `<tr class="total-row"><td class="name">합계</td><td></td><td></td><td></td>
    <td>${won(cost)}</td><td>${won(val)}</td>
    <td class="${cls(pl)}">${signWon(pl)}${dc ? `<div class="day-chg ${dayChangeCls(dc)}"><span class="day-lbl">전일대비</span> ${dayChangeWon(dc)}</div>` : ""}</td>
    <td class="${cls(pl)}">${pct(ret)}${dc ? `<div class="day-chg ${dayChangeCls(dc)}">${dayChangePct(dc)}</div>` : ""}</td></tr>`;
}

function renderHoldings() {
  const d = effectiveDate();
  const pos = positionsOnDate(d);
  const prevDay = prevTradingDay(d);
  const prevPos = prevDay ? positionsOnDate(prevDay) : [];
  const banner = document.getElementById("staleBanner");
  if (!pos.length) {
    banner.innerHTML = "";
    document.getElementById("accounts").innerHTML = `<div class="loading">${d} 기준 보유 종목이 없습니다.</div>`;
    return;
  }
  const staleTickers = new Set();   // 이번 렌더에서 직전 거래일 종가로 끌어다 쓴(미갱신) 종목
  const html = holdingsView === "stock"
    ? renderHoldingsByStock(pos, prevPos, d, staleTickers)
    : renderHoldingsByAccount(pos, prevPos, d, staleTickers);
  // 신선도 경고는 토글과 겹치지 않도록 보유 표 위 별도 영역에 둔다.
  banner.innerHTML = staleTickers.size
    ? `<div class="stale-banner">⚠ ${staleTickers.size}개 종목은 ${isToday() ? "최신" : d} 종가가 아직 데이터 소스에 들어오지 않아
      <b>직전 거래일 종가</b>로 표시 중입니다. 평가금액이 실제와 다를 수 있습니다.
      잠시 후 새로고침하면 대개 채워집니다.</div>`
    : "";
  document.getElementById("accounts").innerHTML = html;
}

// 계좌별: 계좌마다 표 하나 + 계좌 합계.
function renderHoldingsByAccount(pos, prevPos, d, staleTickers) {
  const byAcc = {}, byAccPrev = {};
  for (const p of pos) (byAcc[p.account] ??= []).push(p);
  for (const p of prevPos) (byAccPrev[p.account] ??= []).push(p);
  let html = "", first = true;
  for (const acc of ACC_ORDER.filter(a => byAcc[a])) {
    const rows = sortHoldings(byAcc[acc]);
    const aVal = rows.reduce((s, r) => s + r.value, 0), aCost = rows.reduce((s, r) => s + r.cost, 0);
    const aPl = aVal - aCost, aRet = aCost ? aPl / aCost * 100 : 0;
    const prevRows = byAccPrev[acc] ?? [];
    const dc = dayChange(prevRows, rows, d);
    const prevHeld = new Set(prevRows.map(r => r.ticker));
    html += `<h2>${acc}${first ? " " + holdingsToggleHTML() : ""}<span class="acc-meta">${won(aVal)} · <span class="${cls(aPl)}">${pct(aRet)}</span></span></h2>`;
    first = false;
    html += `<table>${holdingsThead()}<tbody>`;
    for (const r of rows) html += holdingRow(r, d, prevHeld, staleTickers);
    html += holdingsTotalRow(aCost, aVal, dc) + `</tbody></table>`;
  }
  return html;
}

// 종목별 비중 가로 막대. 평가금액 비중(value/total)을 100% 트랙에 절대 스케일로 그린다.
// 비중 큰 순으로 정렬해, 한 종목이 전체에서 차지하는 폭이 한눈에 들어오게 한다.
// 레이아웃은 CSS grid 3컬럼(라벨 | 막대 | 값). 값 컬럼은 금액(굵게)+% 2단으로 칼같이 우측 정렬.
function weightBarsHTML(rows, tVal) {
  if (!tVal || !rows.length) return "";
  const sorted = rows.slice().sort((a, b) => b.value - a.value);
  const bars = sorted.map(r => {
    const w = r.value / tVal * 100;
    const cl = r.region === "해외" ? "ov" : "kr";
    return `<div class="wbar-row">
      <div class="wbar-name" title="${r.name}">${r.name}</div>
      <div class="wbar-track"><div class="wbar-fill ${cl}" style="width:${w.toFixed(2)}%"></div></div>
      <div class="wbar-val"><span class="amt">${won(r.value)}</span><span class="pct">${w.toFixed(1)}%</span></div>
    </div>`;
  }).join("");
  // 범례에 국내/해외 합계 비중 표시.
  const ovP = rows.reduce((s, r) => s + (r.region === "해외" ? r.value : 0), 0) / tVal * 100;
  const krP = 100 - ovP;
  return `<div class="wbars">
    <div class="wbars-head">종목 비중<span class="wbars-sub">· 평가금액 기준 · 막대 길이 = 전체에서 차지하는 비중</span>
      <span class="wbars-legend"><span><i class="kr"></i>국내 (${krP.toFixed(1)}%)</span><span><i class="ov"></i>해외 (${ovP.toFixed(1)}%)</span></span></div>
    ${bars}
  </div>`;
}

// 반도체 집중도(look-through): 저장된 ETF별 반도체 비중(etf_semi_weights.yaml)을
// 실시간 평가금액에 곱해 삼성전자/SK하이닉스/기타 반도체 노출을 환산한다.
function semiConcentration(rows) {
  const W = DATA.semi_weights || {};
  const code = {};   // ticker -> krx_code
  for (const l of DATA.lots) if (l.krx_code) code[l.ticker] = l.krx_code;
  for (const c of DATA.closed) if (c && c.krx_code) code[c.ticker] = c.krx_code;
  const B = { "삼성전자": 0, "SK하이닉스": 0, "한국기타반도체": 0, "글로벌반도체": 0 };
  let semi = 0, total = 0;
  for (const r of rows) {
    total += r.value;
    const w = W[code[r.ticker]];
    if (!w) continue;
    for (const k in B) { const part = r.value * ((w[k] || 0) / 100); B[k] += part; semi += part; }
  }
  return { B, semi, total };
}

// 반도체 집중도 박스. 종목 비중과 동일한 .wbar-row 그리드(라벨 | 막대 | 값)를 공유해
// 칼같이 정렬한다. 길게 어긋나던 분할막대(.semi-split)는 제거했고, 각 행의 값 컬럼은
// 금액(굵게)+% 2단. 막대·%는 모두 전체 평가금액 대비 절대 스케일.
function semiBoxHTML(rows) {
  const W = DATA.semi_weights || {};
  if (!W || !Object.keys(W).length) return "";   // 비중 데이터 없으면 섹션 생략
  const { B, semi, total } = semiConcentration(rows);
  if (!total) return "";
  const p = v => total ? v / total * 100 : 0;
  const sshy = B["삼성전자"] + B["SK하이닉스"];
  // 한 막대 행 = 그리드 3컬럼. strong=라벨·금액 강조(현재 미사용이나 일관성 위해 인자 유지).
  const bar = (label, val, cl, strong) => {
    const rowCl = strong ? "wbar-row is-strong" : "wbar-row";
    return `<div class="${rowCl}">
      <div class="wbar-name" title="${label}">${label}</div>
      <div class="wbar-track"><div class="wbar-fill ${cl}" style="width:${p(val).toFixed(2)}%"></div></div>
      <div class="wbar-val"><span class="amt">${won(val)}</span><span class="pct">${p(val).toFixed(1)}%</span></div></div>`;
  };
  const warn = p(sshy) >= 35
    ? `<div class="semi-warn">⚠ 삼성전자+SK하이닉스가 평가금액의 <b>${p(sshy).toFixed(1)}%</b> — 단 2개 종목에 대한 집중이 큽니다. 한 종목을 직접 더 사기 전에 이 수치부터 보세요.</div>`
    : "";
  // ① 신선도 경고: 비중 기준일이 오래되면(>45일) 갱신을 권한다(자동화 실패 백스톱).
  const asof = DATA.semi_weights_asof || "";
  let stale = "";
  if (asof) {
    const age = Math.floor((Date.now() - new Date(asof + "T00:00:00")) / 86400000);
    if (age > 45) stale = `<div class="semi-warn">🕐 비중 데이터가 <b>${age}일</b> 경과(${asof} 기준). <code>python refresh_semi_weights.py</code> 로 국내 비중을 갱신하세요.</div>`;
  }
  const nonSemi = total - semi;   // 비반도체 잔여 → 막대들이 전체 평가금액 100%로 합산되게 한다
  return `<div class="semi-box">
    <div class="semi-head">🔬 반도체 집중도 (look-through)<span class="semi-asof">· ETF 구성 추정 기준 ${asof || "-"} · 국내 자동·해외 수동</span></div>
    ${stale}
    <div class="semi-total"><span class="lbl">전체 반도체 노출</span><span class="val"><b>${won(semi)}</b><span class="pctbig">${p(semi).toFixed(1)}%</span></span></div>
    ${bar("삼성전자", B["삼성전자"], "kr")}
    ${bar("SK하이닉스", B["SK하이닉스"], "kr")}
    <div class="semi-sub"><span class="cap">└ 삼성+하이닉스 합 (위 두 종목 소계)</span><span class="val"><b>${won(sshy)}</b> · ${p(sshy).toFixed(1)}%</span></div>
    ${bar("한국 기타 반도체", B["한국기타반도체"], "kr")}
    ${bar("글로벌 반도체", B["글로벌반도체"], "ov")}
    ${bar("비반도체", nonSemi, "na")}
    ${warn}
    <div class="semi-note">막대·%는 모두 <b>전체 평가금액 대비</b>입니다 — 반도체 4개 + 비반도체 = 100%. '삼성+하이닉스 합'은 위 두 종목의 소계(중복)라 합산에서 제외. 'RISE 삼성전자SK하이닉스'(주식50/채권50)는 주식분만 두 종목으로 반영. 비중 추정치는 <code>etf_semi_weights.yaml</code>에서 갱신.</div>
  </div>`;
}

// 종목별: 같은 티커를 모든 계좌에 걸쳐 합산해 한 표로. 여러 계좌면 '계좌 합산' 태그.
function renderHoldingsByStock(pos, prevPos, d, staleTickers) {
  const agg = {};
  for (const p of pos) {
    const b = agg[p.ticker] ??= { name: p.name, ticker: p.ticker, region: p.region,
      shares: 0, cost: 0, value: 0, accounts: new Set(), parts: [] };
    b.shares += p.shares; b.cost += p.cost; b.value += p.value;
    b.accounts.add(p.account); b.parts.push(p);
  }
  const rows = sortHoldings(Object.values(agg).map(r => ({ ...r,
    avg_price: r.shares ? r.cost / r.shares : 0, price: r.shares ? r.value / r.shares : 0,
    pl: r.value - r.cost, return_pct: r.cost ? (r.value - r.cost) / r.cost * 100 : 0,
  })));
  const tVal = rows.reduce((s, r) => s + r.value, 0), tCost = rows.reduce((s, r) => s + r.cost, 0);
  const tPl = tVal - tCost, tRet = tCost ? tPl / tCost * 100 : 0;
  const dc = dayChange(prevPos, pos, d);
  const prevHeld = new Set(prevPos.map(r => r.ticker));
  let html = `<h2>전체 종목 ${holdingsToggleHTML()}<span class="acc-meta">${won(tVal)} · <span class="${cls(tPl)}">${pct(tRet)}</span></span></h2>`;
  html += `<table>${holdingsThead()}<tbody>`;
  for (const r of rows) {
    if (r.accounts.size > 1) {
      // 여러 계좌 합산 → 클릭하면 계좌별 내역 펼침. 셰브론으로 펼침 상태 표시.
      const exp = expandedStocks.has(r.ticker);
      const tag = `<span class="tag merged"><span class="exp-chev${exp ? " open" : ""}">▸</span>${r.accounts.size}계좌 합산</span>`;
      html += holdingRow(r, d, prevHeld, staleTickers, tag,
        `class="merged-row" onclick="toggleStock('${r.ticker}')"`);
      if (exp) for (const p of sortHoldings(r.parts)) html += holdingSubRow(p);
    } else {
      html += holdingRow(r, d, prevHeld, staleTickers);
    }
  }
  html += holdingsTotalRow(tCost, tVal, dc) + `</tbody></table>`;
  // 표 다음 = 분석 영역. --semi 모드면 토글을 카드 바로 위 '분석 바'에 둔다(컨트롤↔대상 인접).
  // 토글 ON 이면 종목 비중 ↔ 반도체 집중도 좌우 2단, OFF 면 종목 비중만 전체폭.
  if (SHOW_SEMI) {
    html += `<div class="analysis-bar"><span class="analysis-label">분석</span>${semiToggleHTML()}</div>`;
    html += showSemiBox
      ? `<div class="charts-2col">${weightBarsHTML(rows, tVal)}${semiBoxHTML(rows)}</div>`
      : weightBarsHTML(rows, tVal);
  } else {
    html += weightBarsHTML(rows, tVal);
  }
  return html;
}

function renderRealized() {
  const d = effectiveDate();
  const r = realizedAsOf(d);
  const head = document.getElementById("realizedHeader");
  const note = document.getElementById("realizedNote");
  if (!r.trades.length) { head.style.display = "none"; note.style.display = "none"; document.getElementById("realized").innerHTML = ""; return; }
  head.style.display = ""; note.style.display = "";
  note.innerHTML = `${isToday() ? "" : d + "까지 "}매도/만기 완료 ${r.trades.length}건 · 누적 확정수익 <span class="${cls(r.total)}">${signWon(r.total)}</span>`;
  let html = `<table><thead><tr>
    <th class="name">종목</th><th>계좌</th><th>매수일</th><th>매도일</th>
    <th>매입금액</th><th>매도금액</th><th>확정수익</th><th>수익률</th>
  </tr></thead><tbody>`;
  for (const t of r.trades) {
    html += `<tr>
      <td class="name">${t.name}</td>
      <td style="text-align:left;color:var(--muted)">${t.account}</td>
      <td>${t.buy_date}</td><td>${t.sell_date}</td>
      <td>${won(t.cost)}</td><td>${won(t.proceeds)}</td>
      <td class="${cls(t.pl)}">${signWon(t.pl)}</td>
      <td class="${cls(t.pl)}">${pct(t.return_pct)}</td>
    </tr>`;
  }
  html += `<tr class="total-row"><td class="name">합계</td><td></td><td></td><td></td>
    <td></td><td></td><td class="${cls(r.total)}">${signWon(r.total)}</td><td></td></tr></tbody></table>`;
  document.getElementById("realized").innerHTML = html;
}

reload();
</script>
</body>
</html>
